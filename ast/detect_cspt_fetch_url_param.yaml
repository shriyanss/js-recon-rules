id: detect_cspt_fetch_url_param
name: Client-Side Path Traversal (CSPT) — URL parameter in fetch() URL
author: shriyanss
description: >-
    Detects a likely Client-Side Path Traversal where a value read from the page URL
    (URLSearchParams, window.location.search/hash, document.referrer, document.URL)
    is interpolated into a fetch() URL via a template literal or string concatenation
    without encodeURIComponent / encodeURI normalization. The browser collapses
    `..` segments before the request is sent, so an attacker can redirect the fetch
    to a different API path. Fires when both the source pattern and a fetch() sink
    are present in the same chunk/module.
severity: high
type: ast
tech:
    - next

steps:
    - name: find_url_param_source
      message: URL-derived value read (URLSearchParams.get / location.search|hash / document.referrer|URL / useSearchParams / useParams)
      esquery:
          type: esquery
          query: ':matches(CallExpression[callee.type="MemberExpression"][callee.property.name="get"][callee.object.type="NewExpression"][callee.object.callee.name="URLSearchParams"], MemberExpression[property.name="search"][object.property.name="location"], MemberExpression[property.name="search"][object.name="location"], MemberExpression[property.name="hash"][object.property.name="location"], MemberExpression[property.name="hash"][object.name="location"], MemberExpression[property.name="referrer"][object.name="document"], MemberExpression[property.name="URL"][object.name="document"], CallExpression[callee.type="MemberExpression"][callee.property.name="useSearchParams"], CallExpression[callee.name="useSearchParams"], CallExpression[callee.type="MemberExpression"][callee.property.name="useParams"], CallExpression[callee.name="useParams"])'

    - name: find_fetch_dynamic_url_sink
      message: fetch() called with a dynamically constructed URL (template literal or string concatenation)
      requires:
          - find_url_param_source
      esquery:
          type: esquery
          taintFrom: find_url_param_source
          query: ':matches(CallExpression[callee.name="fetch"][arguments.0.type="TemplateLiteral"][arguments.0.expressions.0], CallExpression[callee.name="fetch"][arguments.0.type="BinaryExpression"][arguments.0.operator="+"], CallExpression[callee.type="MemberExpression"][callee.property.name="fetch"][arguments.0.type="TemplateLiteral"][arguments.0.expressions.0], CallExpression[callee.type="MemberExpression"][callee.property.name="fetch"][arguments.0.type="BinaryExpression"][arguments.0.operator="+"])'
