id: detect_link_manipulation_href
name: Link Manipulation via URL parameter into element.href
author: shriyanss
description: >-
    Detects an `element.href = X` assignment (or `.setAttribute("href", X)`)
    where a URL-derived value is read in the same chunk. When the href is on
    a clickable element, an attacker can inject a `javascript:` URI that fires
    in the page origin when the user clicks the link. Excludes
    `window.location.href = X` (covered by the dedicated open-redirect rule)
    by requiring the assignment's object NOT to be a `location` reference.
severity: high
type: ast
tech:
    - next

steps:
    - name: find_url_param_source
      message: URL-derived value read (URLSearchParams.get / location.search|hash / document.referrer|URL / useSearchParams)
      esquery:
          type: esquery
          query: ":matches(CallExpression[callee.type=\"MemberExpression\"][callee.property.name=\"get\"][callee.object.type=\"NewExpression\"][callee.object.callee.name=\"URLSearchParams\"], MemberExpression[property.name=\"search\"][object.property.name=\"location\"], MemberExpression[property.name=\"search\"][object.name=\"location\"], MemberExpression[property.name=\"hash\"][object.property.name=\"location\"], MemberExpression[property.name=\"hash\"][object.name=\"location\"], MemberExpression[property.name=\"referrer\"][object.name=\"document\"], MemberExpression[property.name=\"URL\"][object.name=\"document\"], CallExpression[callee.type=\"MemberExpression\"][callee.property.name=\"useSearchParams\"], CallExpression[callee.name=\"useSearchParams\"])"

    - name: find_link_href_sink
      message: "anchor/link href assigned a non-literal value (potential javascript: URI sink)"
      requires:
          - find_url_param_source
      esquery:
          type: esquery
          query: ":matches(AssignmentExpression[left.type=\"MemberExpression\"][left.property.name=\"href\"]:not([left.object.property.name=\"location\"]):not([left.object.name=\"location\"]):not([right.type=\"StringLiteral\"]):not([right.type=\"NullLiteral\"]), CallExpression[callee.type=\"MemberExpression\"][callee.property.name=\"setAttribute\"][arguments.0.value=\"href\"])"
