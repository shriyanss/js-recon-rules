id: detect_json_injection_to_dangerouslysetinnerhtml
name: Client-Side JSON Injection into dangerouslySetInnerHTML
author: shriyanss
description: >-
    Detects a three-way co-occurrence in a single chunk/module: a URL-derived
    value is read, then passed to `JSON.parse(...)`, and the module also contains
    a dynamic `dangerouslySetInnerHTML={{ __html: X }}` sink. The compiled output
    of `JSON.parse(searchParams.get("config"))` flowing into a React render
    creates a stored-style XSS primitive — attacker-controlled JSON field values
    appear unsanitised in the DOM.
severity: high
type: ast
tech:
    - next

steps:
    - name: find_url_param_source
      message: URL-derived value read (URLSearchParams.get / location.search|hash / document.referrer|URL / useSearchParams)
      esquery:
          type: esquery
          query: ':matches(CallExpression[callee.type="MemberExpression"][callee.property.name="get"][callee.object.type="NewExpression"][callee.object.callee.name="URLSearchParams"], MemberExpression[property.name="search"][object.property.name="location"], MemberExpression[property.name="search"][object.name="location"], MemberExpression[property.name="hash"][object.property.name="location"], MemberExpression[property.name="hash"][object.name="location"], MemberExpression[property.name="referrer"][object.name="document"], MemberExpression[property.name="URL"][object.name="document"], CallExpression[callee.type="MemberExpression"][callee.property.name="useSearchParams"], CallExpression[callee.name="useSearchParams"])'

    - name: find_json_parse_call
      message: JSON.parse() call (parses attacker-controlled string into an object)
      requires:
          - find_url_param_source
      esquery:
          type: esquery
          query: 'CallExpression[callee.type="MemberExpression"][callee.object.name="JSON"][callee.property.name="parse"]'

    - name: find_dangerously_set_inner_html_dynamic
      message: dangerouslySetInnerHTML __html with a non-literal value (XSS sink)
      requires:
          - find_json_parse_call
      esquery:
          type: esquery
          query: 'ObjectProperty[key.name="__html"]:not([value.type="StringLiteral"]):not([value.type="TemplateLiteral"]):not([value.type="NullLiteral"]):not([value.type="NumericLiteral"]):not([value.type="BooleanLiteral"])'
